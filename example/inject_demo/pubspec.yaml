name: inject_demo
description: >-
  Pure-Dart example demonstrating testeador's `TestInjector` codegen — picks
  up existing `test()` blocks from `test/` and composes them as steps of a
  `TestFlow` via static getters, name lookups, tag lookups, and regex
  lookups.
publish_to: none

environment:
  sdk: ^3.11.0

dependencies:
  testeador:
    path: ../../

dev_dependencies:
  build_runner: ^2.15.0
  build_test: ^3.5.15
  test: ^1.31.0
