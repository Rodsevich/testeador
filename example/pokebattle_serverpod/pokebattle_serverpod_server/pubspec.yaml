name: pokebattle_serverpod_server
description: Starting point for a Serverpod server.
# version: 1.0.0
# homepage: https://www.example.com

environment:
  sdk: '^3.8.0'

# NOTE: Intentionally NOT `resolution: workspace`. The Flutter subpackage in
# this workspace pins `meta 1.17.0` via `flutter_test`, while testeador's
# codegen requires `analyzer ^13` (which pulls `meta 1.18.x`). Keeping the
# server out of the workspace lets it resolve independently so
# `build_runner build` succeeds here.

dependencies:
  http: ^1.2.0
  pokebattle_serverpod_client:
    path: ../pokebattle_serverpod_client
  serverpod: 3.4.4

dev_dependencies:
  build_runner: ^2.4.0
  build_test: ^3.5.0
  lints: '>=3.0.0 <7.0.0'
  serverpod_test: 3.4.4
  test: ^1.25.5
  testeador:
    path: ../../../

serverpod:
  scripts:
    # Starts the in-memory server (no database, no Redis).
    start: dart bin/main.dart

    # Build the Flutter web app and copy it to the server's web directory.
    # Windows uses xcopy since flutter's --output flag doesn't work there.
    # See: https://github.com/flutter/flutter/issues/157886
    flutter_build:
      windows: >-
        (if exist web\app rmdir /S /Q web\app)
        & cd /D ..\pokebattle_serverpod_flutter
        && flutter build web --base-href /app/ --wasm
        && xcopy /E /I /Y build\web ..\pokebattle_serverpod_server\web\app
      posix: |
        cd ../pokebattle_serverpod_flutter
        flutter build web --base-href /app/ --wasm --output ../pokebattle_serverpod_server/web/app
