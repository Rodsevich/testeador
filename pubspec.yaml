name: testeador
description: >-
  Sequential integration (contract) test orchestrator for Dart and Flutter
  CI/CD pipelines, with a built-in MCP server.
version: 0.3.0
repository: https://github.com/Rodsevich/testeador
homepage: https://github.com/Rodsevich/testeador
issue_tracker: https://github.com/Rodsevich/testeador/issues
topics:
  - testing
  - integration-testing
  - contract-testing
  - ci
  - mcp

environment:
  sdk: ^3.11.0

dependencies:
  analyzer: ^13.0.0
  args: ^2.4.0
  build: ^4.0.6
  dio: ^5.0.0
  glob: ^2.1.0
  image: ^4.5.0
  matcher: ^0.12.16
  mcp_dart: ^2.1.1
  meta: ^1.10.0
  path: ^1.9.0
  source_gen: ^4.2.3
  test: ^1.30.0

dev_dependencies:
  build_runner: ^2.4.0
  build_test: ^3.5.15
  mocktail: ^1.0.5
  very_good_analysis: ^10.2.0

executables:
  testeador:
